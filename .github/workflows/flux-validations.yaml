name: Validate Flux Kustomizations

on:
  pull_request:
    paths:
      - 'clusters/**'
      - 'infrastructure/**'
      - 'apps/**'
      - 'storage/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Kustomize
        run: |
          curl -s https://raw.githubusercontent.com/kubernetes-sigs/kustomize/kustomize/v5.7.1/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin

      - name: Validate Gondor infrastructure
        run: |
          kustomize build infrastructure/gondor

      - name: Validate Gondor apps
        run: |
          kustomize build apps/gondor

      - name: Validate Gondor storage
        run: |
          kustomize build storage/gondor
