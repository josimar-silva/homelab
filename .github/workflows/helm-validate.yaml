name: Validate Helm Charts

on:
  pull_request:
    paths:
      - 'charts/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: "🔄 Checkout repo"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "⎈ Set up Helm"
        uses: d3adb5/helm-unittest-action@850bc76597579183998069830d5fa8c3ef0ea34a # v2
        with:
          helm-version: '3.10.0'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔍 Lint all charts
        run: |
            for chart in charts/*/; do
            echo "🔍 Linting chart: $chart"
            helm lint "$chart"
            done
      - name: 🧪 Run helm unittest on all charts
        run: ./charts/run-tests.sh
