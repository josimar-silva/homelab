{{- if .Values.persistentVolume.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "one-chart.fullname" . }}
  labels: 
    {{- include "one-chart.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistentVolume.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{- .Values.persistentVolume.size | default "1Gi" }}
  storageClassName: {{- .Values.persistentVolume.storageClass | default "longhorn-default-sc" }}
{{- end }}